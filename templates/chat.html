<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist AI | Medical Q&A Assistant</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-8 col-xl-6 chat">
                <div class="card shadow-lg">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight align-items-center">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/2965/2965879.png"
                                     alt="MediAssist logo" class="rounded-circle user_img">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>MediAssist AI</span>
                                <p>Built by Shraddha3838 · Ask medical questions</p>
                            </div>
                        </div>
                    </div>

                    <div id="messagePanel" class="card-body msg_card_body">
                        <div class="d-flex justify-content-start mb-4">
                            <div class="img_cont_msg">
                                <img src="https://cdn-icons-png.flaticon.com/512/2965/2965879.png"
                                     alt="Bot" class="rounded-circle user_img_msg">
                            </div>
                            <div class="msg_cotainer">
                                Hello! I am MediAssist. Ask me about symptoms, conditions, or general medical topics.
                                <span class="msg_time">now</span>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer">
                        <form id="messageForm" class="input-group">
                            <input type="text" id="userInput" name="msg"
                                   placeholder="Type your medical question..."
                                   autocomplete="off" class="form-control type_msg" required>
                            <div class="input-group-append">
                                <button type="submit" class="input-group-text send_btn">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="disclaimer text-center mt-3">
                    For informational purposes only. Not a substitute for professional medical advice.
                </p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function currentTime() {
            const now = new Date();
            return `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}`;
        }

        function appendMessage(content, isUser) {
            const time = currentTime();
            const avatar = "https://cdn-icons-png.flaticon.com/512/2965/2965879.png";
            const userAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

            const html = isUser
                ? `<div class="d-flex justify-content-end mb-4">
                       <div class="msg_cotainer_send">${content}<span class="msg_time_send">${time}</span></div>
                       <div class="img_cont_msg"><img src="${userAvatar}" class="rounded-circle user_img_msg" alt="You"></div>
                   </div>`
                : `<div class="d-flex justify-content-start mb-4">
                       <div class="img_cont_msg"><img src="${avatar}" class="rounded-circle user_img_msg" alt="Bot"></div>
                       <div class="msg_cotainer">${content}<span class="msg_time">${time}</span></div>
                   </div>`;

            $("#messagePanel").append(html);
            $("#messagePanel").scrollTop($("#messagePanel")[0].scrollHeight);
        }

        $(document).ready(function () {
            $("#messageForm").on("submit", function (event) {
                event.preventDefault();
                const message = $("#userInput").val().trim();
                if (!message) return;

                appendMessage(message, true);
                $("#userInput").val("");

                $.ajax({
                    type: "POST",
                    url: "/get",
                    data: { msg: message }
                })
                .done(function (response) {
                    appendMessage(response, false);
                })
                .fail(function () {
                    appendMessage("Sorry, I could not process your request right now.", false);
                });
            });
        });
    </script>
</body>
</html>
